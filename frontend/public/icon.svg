<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E3F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C8DB0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,240)" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Mirror frame -->
    <ellipse cx="0" cy="0" rx="120" ry="140" />
    <!-- Sparkle top-right -->
    <line x1="100" y1="-120" x2="100" y2="-80" />
    <line x1="80" y1="-100" x2="120" y2="-100" />
    <!-- Sparkle top-left -->
    <line x1="-110" y1="-90" x2="-110" y2="-60" />
    <line x1="-125" y1="-75" x2="-95" y2="-75" />
    <!-- Small sparkle -->
    <line x1="130" y1="-40" x2="130" y2="-20" />
    <line x1="120" y1="-30" x2="140" y2="-30" />
    <!-- Mirror handle -->
    <line x1="0" y1="140" x2="0" y2="200" stroke-width="28"/>
    <line x1="-30" y1="200" x2="30" y2="200" stroke-width="24"/>
  </g>
  <!-- Text -->
  <text x="256" y="480" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" font-weight="bold" fill="#FFFFFF" opacity="0.9">MindMirror</text>
</svg>
